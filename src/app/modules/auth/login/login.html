
  <div class="modal-body">
    
      <form>
        <div class="input-group mb-3">
          <span class="input-group-text bg-transparent border-end-0 text-black">
            <i class="fa-solid fa-user"></i>
          </span>
          <input type="text" 
                 class="form-control bg-transparent text-black border-start-0" 
                 placeholder="Username" 
                 aria-label="Username">
        </div>

        <div class="input-group mb-4">
          <span class="input-group-text bg-transparent border-end-0 text-black">
            <i class="fa-solid fa-lock"></i>
          </span>
          <input type="password" 
                 class="form-control bg-transparent text-Black border-start-0" 
                 placeholder="Password" 
                 aria-label="Password">
        </div>

        </div> -->

        <a href="#" class="text-Black-50 text-decoration-none small">Forgot Password?</a>

  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-info w-100 mb-3 py-2 fw-bold text-black" (click)="login()">
      Login
