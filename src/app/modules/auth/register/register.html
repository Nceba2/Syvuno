
  <div class="modal-body">
      <form>
        <div class="mb-3">
          <label class="form-label text-black-50 small">Full Name</label>

            <span class="input-group-text bg-transparent text-black border-end-0"><i class="fa-solid fa-id-card"></i></span>
            <input type="text" class="form-control bg-transparent text-black border-start-0" placeholder="John Doe">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-black-50 small">Email Address</label>
          <div class="input-group">

            <input type="email" class="form-control bg-transparent text-black border-start-0" placeholder="name@example.com">

        </div>

        <div class="row">

        </div>

        <div class="mb-4 form-check">

          <label class="form-check-label text-black-50 small" for="terms">

        <p class="text-black-50 small">
